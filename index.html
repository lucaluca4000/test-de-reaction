<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Test</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #0f0f0f;
    font-family: Arial;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* container */
#app {
    text-align: center;
}

/* bouton */
button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    background: white;
    color: black;
    margin: 10px;
}

/* zone test */
#box {
    width: 300px;
    height: 300px;
    background: #222;
    margin: 20px auto;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    border-radius: 10px;
    user-select: none;
}

/* stats */
#stats {
    margin-top: 20px;
    font-size: 18px;
    opacity: 0.9;
}
</style>
</head>

<body>

<div id="app">

    <h1>Test de Réaction</h1>

    <button id="startBtn">Commencer</button>

    <div id="box">Clique pour commencer</div>

    <div id="stats">
        Moyenne : — ms <br>
        Meilleur : — ms <br>
        Tour : 0 / 5
    </div>

</div>

<script>
const box = document.getElementById("box");
const startBtn = document.getElementById("startBtn");
const stats = document.getElementById("stats");

let state = "idle";
let startTime;
let timeout;
let round = 0;
let results = [];

/* démarrer test */
startBtn.onclick = () => {
    round = 0;
    results = [];
    nextRound();
};

/* round */
function nextRound() {
    if (round >= 5) {
        endTest();
        return;
    }

    state = "waiting";
    box.style.background = "#222";
    box.textContent = "Attends le vert...";
    round++;

    stats.innerHTML = `
        Moyenne : — ms <br>
        Meilleur : — ms <br>
        Tour : ${round} / 5
    `;

    let delay = Math.random() * 3000 + 1000;

    timeout = setTimeout(() => {
        box.style.background = "green";
        box.textContent = "CLIQUER !";

        state = "ready";
        startTime = Date.now();
    }, delay);
}

/* clic zone */
box.onclick = () => {

    if (state === "waiting") {
        box.textContent = "Trop tôt !";
        clearTimeout(timeout);
        setTimeout(nextRound, 1000);
        return;
    }

    if (state === "ready") {
        let reaction = Date.now() - startTime;
        results.push(reaction);

        box.textContent = reaction + " ms";

        state = "show";

        setTimeout(nextRound, 1200);
    }
};

/* fin */
function endTest() {
    let avg = Math.round(results.reduce((a,b)=>a+b,0) / results.length);
    let best = Math.min(...results);

    box.style.background = "#222";
    box.textContent = "Test terminé";

    stats.innerHTML = `
        Moyenne : ${avg} ms <br>
        Meilleur : ${best} ms <br>
        Résultats : ${results.join(" / ")} ms
    `;
}
</script>

</body>
</html>
