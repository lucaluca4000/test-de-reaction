<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>...</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: black;
    overflow: hidden;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* bouton */
#btn {
    padding: 20px 30px;
    font-size: 22px;
    cursor: pointer;
}

/* compteur */
#count {
    font-size: 120px;
    display: none;
}

/* image */
#img {
    display: none;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}

/* flash */
#flash {
    position: fixed;
    inset: 0;
    background: white;
    display: none;
    z-index: 999;
}

/* glitch overlay */
#glitch {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.05),
        rgba(0,0,0,0.05) 2px
    );
    display: none;
    z-index: 998;
}

/* shake */
.shake {
    animation: shake 0.1s infinite;
}

@keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(4px,4px); }
    50% { transform: translate(-4px,4px); }
    75% { transform: translate(4px,-4px); }
    100% { transform: translate(0,0); }
}
</style>
</head>
<body>

<button id="btn">Démarrer</button>
<div id="count">3</div>

<div id="flash"></div>
<div id="glitch"></div>

<img id="img" src="R.jpg">

<audio id="sound">
    <source src="scream.mp3" type="audio/mpeg">
</audio>

<script>
const btn = document.getElementById("btn");
const count = document.getElementById("count");
const img = document.getElementById("img");
const sound = document.getElementById("sound");
const flash = document.getElementById("flash");
const glitch = document.getElementById("glitch");

sound.volume = 1.0;

// fullscreen safe
async function enterFS() {
    try {
        if (document.documentElement.requestFullscreen) {
            await document.documentElement.requestFullscreen();
        }
    } catch(e) {}
}

// si utilisateur sort du fullscreen → on ne spam pas, on propose juste retour
document.addEventListener("fullscreenchange", () => {
    if (!document.fullscreenElement && img.style.display === "block") {
        // petit rappel discret
        btn.style.display = "block";
        btn.textContent = "Revenir en plein écran";
    }
});

btn.addEventListener("click", async () => {
    btn.style.display = "none";

    await enterFS();

    let n = 3;
    count.style.display = "block";

    const timer = setInterval(() => {
        count.textContent = n;
        n--;

        if (n < 0) {
            clearInterval(timer);

            count.style.display = "none";

            // glitch phase
            glitch.style.display = "block";

            setTimeout(() => {
                glitch.style.display = "none";
                flash.style.display = "block";

                setTimeout(() => {
                    flash.style.display = "none";

                    img.style.display = "block";
                    document.body.classList.add("shake");

                    sound.currentTime = 0;
                    sound.play().catch(() => {});
                }, 200);
            }, 400);
        }
    }, 1000);
});
 <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen Click</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-family: Arial;
}

#msg {
    font-size: 24px;
}
</style>
</head>
<body>

<div id="msg">Clique n'importe où pour passer en plein écran</div>

<script>
async function goFullscreen() {
    try {
        if (document.documentElement.requestFullscreen) {
            await document.documentElement.requestFullscreen();
        }
    } catch (e) {}
}

document.addEventListener("click", () => {
    goFullscreen();
});   
</script>

</body>
</html>
