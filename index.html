<title>Reaction Test</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #0f0f0f;
    font-family: Arial;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

#app { text-align: center; }

button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    cursor: pointer;
    border-radius: 8px;

}

#box {
    width: 300px;
    height: 300px;
    background: #222;
    margin: 20px auto;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    border-radius: 10px;
    user-select: none;
    cursor: pointer;
    transition: 0.2s;
}

.green {
    background: #00c853 !important;
    color: black;
}

#img {
    display: none;
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}

.shake {
    animation: shake 0.07s infinite;
}

@keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(5px,-3px); }
    50% { transform: translate(-5px,3px); }
    75% { transform: translate(3px,5px); }
    100% { transform: translate(0,0); }
}

#bonusBtn {
    display: none;
    background: red;
    color: white;
}
</style>
