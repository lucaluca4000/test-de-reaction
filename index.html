<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Test</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #0f0f0f;
    font-family: Arial;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

#container {
    text-align: center;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#box {
    width: 300px;
    height: 300px;
    margin: 20px auto;
    background: #222;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    user-select: none;
    cursor: pointer;
}

.green {
    background: #00c853 !important;
    color: black;
}

#img {
    display: none;
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}

.shake {
    animation: shake 0.07s infinite;
}

@keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(5px,-3px); }
    50% { transform: translate(-5px,3px); }
    75% { transform: translate(3px,5px); }
    100% { transform: translate(0,0); }
}

#bonusBtn {
    display: none;
    margin-top: 10px;
    background: red;
    color: white;
}
</style>
</head>

<body>

<div id="container">
    <h2>Test de Réaction</h2>

    <button id="start">Commencer</button>

    <div id="box">Clique pour commencer</div>

    <button id="bonusBtn">Mode bonus 😈</button>
</div>

<img id="img" src="R.jpg">

<audio id="sound">
    <source src="scream.mp3" type="audio/mpeg">
</audio>
