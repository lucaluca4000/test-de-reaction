<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>...</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: black;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 80px;
    font-family: Arial, sans-serif;
}

#img {
    display: none;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}

#btn {
    font-size: 25px;
    padding: 20px;
    cursor: pointer;
    position: absolute;
}

#count {
    display: none;
}
</style>
</head>
<body>

<button id="btn">Démarrer</button>
<div id="count"></div>

<img id="img" src="R.jpg">

<audio id="sound">
    <source src="scream.mp3" type="audio/mpeg">
</audio>

<script>
const btn = document.getElementById("btn");
const count = document.getElementById("count");
const img = document.getElementById("img");
const sound = document.getElementById("sound");

sound.volume = 1.0;

btn.addEventListener("click", () => {
    btn.style.display = "none";
    count.style.display = "block";

    let n = 3;

    const timer = setInterval(() => {
        count.textContent = n;
        n--;

        if (n < 0) {
            clearInterval(timer);

            // jump scare
            count.style.display = "none";
            img.style.display = "block";

            sound.currentTime = 0;
            sound.play().catch(() => {});
        }
    }, 1000);
});
</script>

</body>
</html>
