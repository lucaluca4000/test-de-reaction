<script>
let isFullscreenRequested = false;

// entrer en plein écran (compatible max navigateurs)
async function goFullscreen() {
    try {
        const el = document.documentElement;

        if (el.requestFullscreen) {
            await el.requestFullscreen();
        } else if (el.webkitRequestFullscreen) {
            el.webkitRequestFullscreen(); // Safari
        } else if (el.msRequestFullscreen) {
            el.msRequestFullscreen(); // vieux Edge/IE
        }

        isFullscreenRequested = true;
    } catch (e) {
        console.log("Fullscreen bloqué :", e);
    }
}

// clic → plein écran (une seule fois proprement)
document.addEventListener("click", () => {
    if (!document.fullscreenElement) {
        goFullscreen();
    }
});

// détection sortie plein écran
document.addEventListener("fullscreenchange", handleExit);
document.addEventListener("webkitfullscreenchange", handleExit);

function handleExit() {
    if (!document.fullscreenElement && isFullscreenRequested) {
        showFullscreenButton();
    } else {
        removeFullscreenButton();
    }
}

// bouton de retour fullscreen (design propre + unique)
function showFullscreenButton() {
    if (document.getElementById("fsbtn")) return;

    const btn = document.createElement("button");
    btn.id = "fsbtn";
    btn.textContent = "🔳 Revenir en plein écran";

    Object.assign(btn.style, {
        position: "fixed",
        top: "20px",
        left: "20px",
        zIndex: "9999",
        padding: "12px 16px",
        fontSize: "16px",
        background: "black",
        color: "white",
        border: "1px solid white",
        cursor: "pointer",
        borderRadius: "8px"
    });

    btn.addEventListener("click", goFullscreen);

    document.body.appendChild(btn);
}

// supprimer bouton si fullscreen actif
function removeFullscreenButton() {
    const btn = document.getElementById("fsbtn");
    if (btn) btn.remove();
}
</script>
