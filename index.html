<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Test</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: black;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    color: white;
}

/* bouton */
#btn {
    padding: 20px 30px;
    font-size: 22px;
    cursor: pointer;
    background: white;
    color: black;
    border: none;
    border-radius: 10px;
}

/* texte compteur */
#count {
    font-size: 140px;
    display: none;
}

/* image jump scare */
#img {
    display: none;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}

/* shake */
.shake {
    animation: shake 0.07s infinite;
}

@keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(5px,-3px); }
    50% { transform: translate(-5px,3px); }
    75% { transform: translate(3px,5px); }
    100% { transform: translate(0,0); }
}
</style>
</head>
<body>

<button id="btn">Commencer test</button>
<div id="count">3</div>

<img id="img" src="R.jpg">

<audio id="sound" preload="auto">
    <source src="scream.mp3" type="audio/mpeg">
</audio>

<script>
const btn = document.getElementById("btn");
const count = document.getElementById("count");
const img = document.getElementById("img");
const sound = document.getElementById("sound");

sound.volume = 1.0;

let running = false;

/* fullscreen */
async function fs() {
    try {
        const el = document.documentElement;
        if (el.requestFullscreen) await el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    } catch(e) {}
}

/* jump scare */
function scare() {
    img.style.display = "block";
    document.body.classList.add("shake");

    sound.currentTime = 0;
    sound.play().catch(() => {});
}

/* démarrage */
btn.addEventListener("click", async () => {
    if (running) return;
    running = true;

    btn.style.display = "none";

    await fs();

    let n = 3;
    count.style.display = "block";

    const timer = setInterval(() => {
        if (n > 0) {
            count.textContent = n;
            n--;
            return;
        }

        if (n === 0) {
            count.textContent = "GO!";
            n--;

            setTimeout(() => {
                clearInterval(timer);
                count.style.display = "none";
                scare();
            }, 700);
        }
    }, 1000);
});
</script>

</body>
</html>
