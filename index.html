<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>...</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: black;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    color: white;
}

/* bouton */
#btn {
    padding: 20px 30px;
    font-size: 22px;
    cursor: pointer;
    background: white;
    color: black;
    border: none;
    border-radius: 10px;
}

/* compteur */
#count {
    font-size: 120px;
    display: none;
}

/* image */
#img {
    display: none;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}

/* overlay discret */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    z-index: 999;
    color: white;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    text-align: center;
}

/* shake plus réaliste */
.shake {
    animation: shake 0.07s infinite;
}

@keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(5px,-3px); }
    50% { transform: translate(-5px,3px); }
    75% { transform: translate(3px,5px); }
    100% { transform: translate(0,0); }
}
</style>
</head>
<body>

<button id="btn">Démarrer</button>
<div id="count">3</div>

<div id="overlay">Sortie plein écran détectée</div>

<img id="img" src="R.jpg">

<audio id="sound" preload="auto">
    <source src="scream.mp3" type="audio/mpeg">
</audio>

<script>
const btn = document.getElementById("btn");
const count = document.getElementById("count");
const img = document.getElementById("img");
const sound = document.getElementById("sound");
const overlay = document.getElementById("overlay");

sound.volume = 1.0;

let running = false;

/* plein écran compatible */
async function fs() {
    try {
        const el = document.documentElement;

        if (!document.fullscreenElement) {
            if (el.requestFullscreen) await el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        }
    } catch(e) {}
}

/* jump scare */
function scare() {
    img.style.display = "block";
    document.body.classList.add("shake");

    sound.currentTime = 0;
    sound.play().catch(() => {});
}

/* clic = toujours tenter fullscreen */
document.addEventListener("click", () => {
    fs();
});

/* start */
btn.addEventListener("click", async () => {
    if (running) return;
    running = true;

    btn.style.display = "none";

    await fs();

    let n = 3;
    count.style.display = "block";

    const timer = setInterval(() => {
        count.textContent = n;
        n--;

        if (n < 0) {
            clearInterval(timer);
            count.style.display = "none";
            scare();
        }
    }, 1000);
});

/* fullscreen exit */
document.addEventListener("fullscreenchange", () => {
    if (!document.fullscreenElement && img.style.display === "block") {
        overlay.style.display = "flex";
    } else {
        overlay.style.display = "none";
    }
});
</script>

</body>
</html>
